name: CI - Frontend

on:
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'

jobs:
  build-and-lint:
    name: Build, Lint & Type-check (Next.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json


      - name: 依存パッケージをインストール
        run: npm ci

      - name: Lint チェック
        run: npm run lint

      - name: TypeScript 型チェック
        run: npm run type-check

      - name: ビルド
        run: npm run build
